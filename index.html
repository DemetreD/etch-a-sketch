<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="shortcut icon" href="./1157969.png" type="image/x-icon">
    <title>Etch a Sketch</title>
  </head>

  <body>
    <header>
      <div class="title">
        <h1>Etch A Sketch</h1>
      </div>
      <div class="content">
        <div class="board"></div>
        <div class="buttons">
          <button id="blackBtn" class="btn">Black</button>
          <button id="erasorBtn" class="btn">Erasor</button>
          <button id="randomBtn" class="btn">Random</button>
          <button id="resetBtn" class="btn">Reset</button>
        </div>
        <div class="user-size-input">
          <input
            type="text"
            placeholder="Size of board"
            value="16"
            id="input"
          />
          <button id="sizeSetter">Set Size</button>
        </div>
      </div>
    </header>

    <script src="./index.js"></script>
  </body>
</html>
